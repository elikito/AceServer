<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="HTTPAceProxy IPTV Player">
    <title>HTTPAceProxy - Reproductor Bento</title>
    <link rel="shortcut icon" href="/stat/img/shesterenka.png" type="image/png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-color: #121214;
            --card-bg: #1a1a1e;
            --border-color: #2d2d34;
            --text-color: #e1e1e6;
            --text-muted: #a8a8b2;
            --header-bg: #1a1a1e;
            --stat-bg: #202024;
            --brand-color: #4CAF50;
            --input-bg: #1a1a1e;
        }

        body.light-theme {
            --bg-color: #f4f4f5;
            --card-bg: #ffffff;
            --border-color: #e4e4e7;
            --text-color: #18181b;
            --text-muted: #71717a;
            --header-bg: #ffffff;
            --stat-bg: #f4f4f5;
            --input-bg: #ffffff;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            padding-bottom: 60px;
        }

        /* Navbar Plano Superior */
        .navbar {
            background-color: var(--header-bg);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 24px;
            height: 56px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-brand {
            font-weight: 700;
            font-size: 18px;
            color: #ffffff;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        body.light-theme .nav-brand {
            color: #18181b;
        }

        .nav-links {
            display: flex;
            gap: 16px;
        }

        .nav-links a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            padding: 8px 12px;
            border-radius: 4px;
            transition: color 0.2s, background-color 0.2s;
        }

        .nav-links a:hover, .nav-links a.active {
            color: var(--text-color);
            background-color: var(--border-color);
        }

        /* Hamburger menu button */
        .navbar-toggle {
            display: none;
            flex-direction: column;
            justify-content: space-between;
            width: 24px;
            height: 18px;
            background: transparent;
            border: none;
            cursor: pointer;
            padding: 0;
            z-index: 101;
        }

        .navbar-toggle .icon-bar {
            width: 100%;
            height: 2px;
            background-color: var(--text-color);
            border-radius: 1px;
            transition: all 0.2s;
        }

        @media (max-width: 768px) {
            .navbar-toggle {
                display: flex;
            }

            .nav-links {
                display: none;
                flex-direction: column;
                position: absolute;
                top: 56px;
                left: 0;
                right: 0;
                background-color: var(--header-bg);
                border-bottom: 1px solid var(--border-color);
                padding: 16px 24px;
                gap: 8px;
                z-index: 99;
            }

            .nav-links.show {
                display: flex;
            }

            .nav-links a {
                width: 100%;
                text-align: center;
                padding: 12px;
            }
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px;
        }

        .header-section {
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }

        .header-title h2 {
            font-size: 22px;
            font-weight: 600;
            color: var(--text-color);
        }

        .header-title p {
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        /* Buscador */
        .search-container {
            position: relative;
        }

        .search-input {
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 14px;
            width: 250px;
            outline: none;
        }

        .search-input:focus {
            border-color: #4CAF50;
        }

        /* Bento Grid */
        .category-section {
            margin-bottom: 40px;
        }

        .category-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-color);
            margin-bottom: 16px;
            padding-left: 4px;
            border-left: 3px solid #4CAF50;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .category-count {
            font-size: 12px;
            color: var(--text-muted);
            background-color: var(--stat-bg);
            padding: 2px 8px;
            border-radius: 12px;
        }

        .bento-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
        }

        /* Bento Card */
        .bento-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
            min-height: 140px;
        }

        .bento-card:hover {
            border-color: #4CAF50;
        }

        .channel-info {
            display: flex;
            align-items: flex-start;
            gap: 12px;
        }

        .channel-logo {
            width: 44px;
            height: 44px;
            object-fit: contain;
            border-radius: 4px;
            background-color: var(--bg-color);
            flex-shrink: 0;
            border: 1px solid var(--border-color);
            padding: 2px;
        }

        .channel-details {
            flex-grow: 1;
            min-width: 0;
        }

        .channel-name {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-color);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* EPG Info */
        .epg-container {
            margin-top: 12px;
            font-size: 12px;
            color: var(--text-muted);
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .epg-now {
            font-weight: 500;
            color: var(--text-color);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .epg-next {
            font-size: 11px;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .epg-progress-bar {
            height: 3px;
            background-color: var(--border-color);
            border-radius: 1.5px;
            overflow: hidden;
            margin-top: 6px;
        }

        .epg-progress-fill {
            height: 100%;
            background-color: #4CAF50;
            width: 0%;
        }

        .card-actions {
            margin-top: 16px;
            display: flex;
            justify-content: flex-end;
            gap: 8px;
        }

        .btn-play {
            background-color: #4CAF50;
            color: #ffffff;
            border: none;
            border-radius: 4px;
            padding: 6px 14px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-play:hover {
            background-color: #45a049;
        }

        .btn-copy {
            background-color: var(--border-color);
            color: var(--text-color);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            padding: 6px 10px;
            font-size: 12px;
            cursor: pointer;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.2s, border-color 0.2s;
        }

        .btn-copy:hover {
            background-color: var(--stat-bg);
        }

        .btn-copy.copied {
            background-color: #4CAF50;
            border-color: #45a049;
            color: white;
        }

        /* Footer Bar */
        .footer-bar {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            height: 40px;
            background-color: var(--header-bg);
            border-top: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 24px;
            font-size: 12px;
            color: var(--text-muted);
            z-index: 100;
        }

        .footer-left, .footer-right {
            display: flex;
            align-items: center;
            gap: 8px;
            width: 200px;
        }

        .footer-right {
            justify-content: flex-end;
        }

        .footer-center {
            display: flex;
            align-items: center;
            justify-content: center;
            flex: 1;
        }

        .footer-left .val {
            font-family: monospace;
            font-weight: 600;
            color: var(--text-color);
        }

        .footer-right .version-badge {
            background-color: var(--border-color);
            padding: 1px 6px;
            border-radius: 4px;
            color: var(--text-color);
            font-weight: 600;
        }

        .theme-toggle-btn {
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 4px;
            border-radius: 4px;
            transition: color 0.2s, background-color 0.2s;
        }

        .theme-toggle-btn:hover {
            color: var(--text-color);
            background-color: var(--border-color);
        }

        .theme-toggle-btn svg {
            width: 16px;
            height: 16px;
            fill: currentColor;
        }

        .loading-screen {
            text-align: center;
            padding: 40px;
            font-size: 14px;
            color: var(--text-muted);
        }
        @media (max-width: 600px) {
            .header-section {
                flex-direction: column;
                align-items: flex-start;
            }
            .search-input {
                width: 100%;
            }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="/stat" class="nav-brand">HTTPAceProxy</a>
        <button class="navbar-toggle" id="navbar-toggle" aria-label="Abrir menú">
            <span class="icon-bar"></span>
            <span class="icon-bar"></span>
            <span class="icon-bar"></span>
        </button>
        <div class="nav-links" id="nav-links">
            <a href="/stat">Dashboard</a>
            <a href="/statplugin/">Canales</a>
            <a href="/listas/">Fuentes</a>
            <a href="/player/index.html" class="active">Reproductor</a>
            <a href="/player/legacy.html">Reproductor Legacy</a>
        </div>
    </nav>

    <!-- Container -->
    <div class="container">
        <div class="header-section">
            <div class="header-title">
                <h2>Reproductor IPTV</h2>
                <p id="loading-status">Cargando canales desde el proxy...</p>
            </div>
            <div class="search-container">
                <input type="text" id="search" class="search-input" placeholder="Buscar canal..." oninput="filterChannels()">
            </div>
        </div>

        <div id="loading-indicator" class="loading-screen">
            Cargando la lista de canales...
        </div>

        <div id="channels-container"></div>
    </div>

    <!-- Footer Bar -->
    <div class="footer-bar">
        <div class="footer-left">
            <span class="label">SERVER IP:</span>
            <span id="server-ip" class="val">-</span>
        </div>
        <div class="footer-center">
            <button id="theme-toggle" class="theme-toggle-btn" title="Alternar tema">
                <svg id="theme-icon" viewBox="0 0 24 24">
                    <path d="M12 3c.132 0 .263 0 .393.007a7.5 7.5 0 0 0 7.92 12.446A9 9 0 1 1 12 3zm0-2a11 11 0 1 0 10.978 11.978A9.5 9.5 0 0 1 12 1.022V1z"/>
                </svg>
            </button>
        </div>
        <div class="footer-right">
            <span class="label">VERSION:</span>
            <span class="val version-badge">v07.18.05</span>
        </div>
    </div>

    <script>
        let allChannels = [];
        let xmltvData = null;
        let epgCache = {};

        // Configuración de URLs
        const EPG_XML_URL = 'https://raw.githubusercontent.com/davidmuma/EPG_dobleM/master/guiatv.xml';

        window.addEventListener('DOMContentLoaded', () => {
            const themeToggle = document.getElementById('theme-toggle');
            const themeIcon = document.getElementById('theme-icon');
            
            if (localStorage.getItem('theme') === 'light') {
                document.body.classList.add('light-theme');
                setLightIcon(themeIcon);
            }
            
            if (themeToggle) {
                themeToggle.addEventListener('click', () => {
                    document.body.classList.toggle('light-theme');
                    if (document.body.classList.contains('light-theme')) {
                        localStorage.setItem('theme', 'light');
                        setLightIcon(themeIcon);
                    } else {
                        localStorage.setItem('theme', 'dark');
                        setDarkIcon(themeIcon);
                    }
                });
            }
            
            document.getElementById('server-ip').textContent = window.location.hostname || '127.0.0.1';

            // Hamburger menu toggle
            const navbarToggle = document.getElementById('navbar-toggle');
            const navLinks = document.getElementById('nav-links');
            if (navbarToggle && navLinks) {
                navbarToggle.addEventListener('click', () => {
                    navLinks.classList.toggle('show');
                });
            }

            loadData();
        });

        function loadData() {
            fetch('/aio')
                .then(res => res.text())
                .then(m3uText => {
                    allChannels = parseM3U(m3uText);
                    document.getElementById('loading-status').textContent = `${allChannels.length} canales cargados. Descargando guía EPG...`;
                    renderChannels();
                    
                    return fetch(EPG_XML_URL);
                })
                .then(res => res.text())
                .then(xmlText => {
                    xmltvData = xmlText;
                    document.getElementById('loading-status').textContent = `${allChannels.length} canales. Sincronizando guía EPG...`;
                    indexEPG(xmlText);
                    document.getElementById('loading-status').textContent = `${allChannels.length} canales. Guía EPG sincronizada con Madrid.`;
                    updateEPGForAll();
                    setInterval(updateEPGForAll, 60000);
                })
                .catch(err => {
                    console.error('Error cargando los datos:', err);
                    document.getElementById('loading-status').textContent = 'Canales cargados sin guía EPG (error de descarga).';
                    document.getElementById('loading-indicator').style.display = 'none';
                });
        }

        function getExactStreamUrl(originalUrl) {
            try {
                var urlObj = new URL(originalUrl);
                var pathParts = urlObj.pathname.split('/');
                if (pathParts.length >= 4) {
                    var type = pathParts[1];
                    var id = pathParts[2];
                    if (type === 'content_id' || type === 'infohash' || type === 'url') {
                        return urlObj.protocol + '//' + window.location.hostname + ':' + (urlObj.port || '8888') + '/' + type + '/' + id + '/stream.ts';
                    }
                }
            } catch(e) {}
            return originalUrl;
        }

        function parseM3U(text) {
            const lines = text.split('\n');
            const channels = [];
            let currentItem = null;
            
            for (let i = 0; i < lines.length; i++) {
                const line = lines[i].trim();
                if (line.startsWith('#EXTINF:')) {
                    currentItem = {};
                    
                    const logoMatch = line.match(/tvg-logo="([^"]*)"/);
                    currentItem.logo = logoMatch ? logoMatch[1] : '';
                    
                    const groupMatch = line.match(/group-title="([^"]*)"/);
                    currentItem.group = groupMatch ? groupMatch[1] : 'Otros';
                    
                    const idMatch = line.match(/tvg-id="([^"]*)"/);
                    currentItem.tvgId = idMatch ? idMatch[1] : '';

                    const commaIdx = line.lastIndexOf(',');
                    currentItem.name = commaIdx !== -1 ? line.substring(commaIdx + 1).trim() : 'Canal';
                } else if (line.startsWith('http') && currentItem) {
                    try {
                        const urlObj = new URL(line);
                        urlObj.host = window.location.host;
                        currentItem.url = urlObj.toString();
                    } catch(e) {
                        currentItem.url = line;
                    }
                    channels.push(currentItem);
                    currentItem = null;
                }
            }
            return channels;
        }

        function renderChannels() {
            const container = document.getElementById('channels-container');
            const searchVal = document.getElementById('search').value.toLowerCase().trim();
            document.getElementById('loading-indicator').style.display = 'none';
            container.innerHTML = '';

            const grouped = {};
            allChannels.forEach((chan, idx) => {
                if (searchVal && !chan.name.toLowerCase().includes(searchVal) && !chan.group.toLowerCase().includes(searchVal)) {
                    return;
                }
                if (!grouped[chan.group]) grouped[chan.group] = [];
                grouped[chan.group].push({ chan, idx });
            });

            const groups = Object.keys(grouped).sort();
            if (groups.length === 0) {
                container.innerHTML = '<div class="loading-screen">No se encontraron canales.</div>';
                return;
            }

            groups.forEach(groupName => {
                const groupContainer = document.createElement('div');
                groupContainer.className = 'category-section';
                
                groupContainer.innerHTML = `
                    <div class="category-title">
                        <span>${groupName}</span>
                        <span class="category-count">${grouped[groupName].length}</span>
                    </div>
                    <div class="bento-grid" id="grid-${groupName.replace(/\s+/g, '-')}"></div>
                `;
                container.appendChild(groupContainer);

                const grid = groupContainer.querySelector('.bento-grid');
                grouped[groupName].forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'bento-card';
                    card.id = `card-${item.idx}`;
                    
                    const fallbackSvg = `<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100"><rect width="100" height="100" fill="%232d2d34"/><text x="50" y="55" font-family="system-ui" font-size="24" fill="%23a8a8b2" text-anchor="middle" font-weight="bold">${item.chan.name.substring(0, 2).toUpperCase()}</text></svg>`;
                    const fallbackLogo = "data:image/svg+xml;utf8," + encodeURIComponent(fallbackSvg);

                    card.innerHTML = `
                        <div class="channel-info">
                            <img class="channel-logo" src="${item.chan.logo || fallbackLogo}" onerror="this.src='${fallbackLogo}'" alt="Logo">
                            <div class="channel-details">
                                <div class="channel-name" title="${item.chan.name}">${item.chan.name}</div>
                                <div class="epg-container" id="epg-info-${item.idx}">
                                    <div class="epg-now">Sin información de guía</div>
                                </div>
                            </div>
                        </div>
                        <div class="card-actions">
                            <a href="${getExactStreamUrl(item.chan.url)}" class="btn-play" target="_blank" title="Play">
                                <svg viewBox="0 0 24 24" width="14" height="14" fill="white"><path d="M8 5v14l11-7z"/></svg>
                            </a>
                            <button class="btn-copy" onclick="copyStreamUrl(getExactStreamUrl('${item.chan.url}'), this)" title="Copy URL">
                                <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>
                            </button>
                        </div>
                    `;
                    grid.appendChild(card);
                });
            });
        }

        function filterChannels() {
            renderChannels();
            if (xmltvData) {
                updateEPGForAll();
            }
        }

        function copyStreamUrl(url, button) {
            navigator.clipboard.writeText(url).then(() => {
                button.classList.add('copied');
                const originalSvg = button.innerHTML;
                button.innerHTML = '<svg viewBox="0 0 24 24" width="14" height="14" fill="white"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>';
                setTimeout(() => {
                    button.classList.remove('copied');
                    button.innerHTML = originalSvg;
                }, 2000);
            }).catch(err => {
                console.error('Failed to copy stream URL:', err);
            });
        }

        // --- LÓGICA DE EPG & FUZZY MATCHING ---

        function sanitizeForMatch(str) {
            if (!str) return '';
            return str.toLowerCase()
                .replace(/\([^)]*\)/g, '')      // Eliminar paréntesis y su contenido
                .replace(/\[[^\]]*\]/g, '')      // Eliminar corchetes y su contenido
                .replace(/720p|1080p|hd|sd/g, '') // Eliminar indicadores de resolución
                .replace(/[^a-z0-9]/g, '')       // Dejar sólo caracteres alfanuméricos
                .trim();
        }

        function indexEPG(xmlText) {
            epgCache = {};
            const regex = /<programme[^>]*channel="([^"]+)"[^>]*>([\s\S]*?)<\/programme>/g;
            let match;
            while ((match = regex.exec(xmlText)) !== null) {
                const channelRaw = match[1];
                const content = match[2];
                
                const startMatch = match[0].match(/start="([^"]+)"/);
                const stopMatch = match[0].match(/stop="([^"]+)"/);
                const titleMatch = content.match(/<title[^>]*>([^<]+)<\/title>/);
                
                if (startMatch && stopMatch && titleMatch) {
                    const prog = {
                        start: parseXMLTVDate(startMatch[1]),
                        stop: parseXMLTVDate(stopMatch[1]),
                        title: titleMatch[1].trim()
                    };
                    
                    const key = sanitizeForMatch(channelRaw);
                    if (!epgCache[key]) {
                        epgCache[key] = [];
                    }
                    epgCache[key].push(prog);
                }
            }
            
            for (const key in epgCache) {
                epgCache[key].sort((a, b) => a.start - b.start);
            }
        }

        function updateEPGForAll() {
            if (!xmltvData) return;
            allChannels.forEach((chan, idx) => {
                const card = document.getElementById(`card-${idx}`);
                if (!card) return;

                const epgEl = document.getElementById(`epg-info-${idx}`);
                if (!epgEl) return;

                const channelId = chan.tvgId || chan.name;
                const programs = parseEPGForChannel(channelId);
                
                if (programs.length === 0) return;

                const now = new Date();
                const current = programs.find(p => now >= p.start && now < p.stop);
                const next = programs.find(p => p.start > now);

                if (current) {
                    const totalDuration = current.stop - current.start;
                    const elapsed = now - current.start;
                    const progressPercent = Math.min(100, Math.max(0, (elapsed / totalDuration) * 100));

                    const formatOptions = { timeZone: 'Europe/Madrid', hour: '2-digit', minute: '2-digit', hour12: false };
                    const startStr = current.start.toLocaleTimeString('es-ES', formatOptions);
                    const stopStr = current.stop.toLocaleTimeString('es-ES', formatOptions);
                    
                    let nextHtml = '';
                    if (next) {
                        const nextStartStr = next.start.toLocaleTimeString('es-ES', formatOptions);
                        nextHtml = `<div class="epg-next">Siguiente: ${nextStartStr} - ${next.title}</div>`;
                    }

                    epgEl.innerHTML = `
                        <div class="epg-now" title="${current.title}">${startStr} - ${current.title}</div>
                        <div class="epg-progress-bar">
                            <div class="epg-progress-fill" style="width: ${progressPercent}%;"></div>
                        </div>
                        ${nextHtml}
                    `;
                }
            });
        }

        function parseEPGForChannel(channelId) {
            const key = sanitizeForMatch(channelId);
            return epgCache[key] || [];
        }

        function parseXMLTVDate(dateStr) {
            const parts = dateStr.match(/^(\d{4})(\d{2})(\d{2})(\d{2})(\d{2})(\d{2})\s+([+-]\d{4})$/);
            if (!parts) return new Date(dateStr);
            
            const year = parseInt(parts[1], 10);
            const month = parseInt(parts[2], 10) - 1;
            const day = parseInt(parts[3], 10);
            const hour = parseInt(parts[4], 10);
            const minute = parseInt(parts[5], 10);
            const second = parseInt(parts[6], 10);
            
            const tzStr = parts[7];
            const tzSign = tzStr[0] === '+' ? 1 : -1;
            const tzHours = parseInt(tzStr.substring(1, 3), 10);
            const tzMinutes = parseInt(tzStr.substring(3, 5), 10);
            
            const utcTime = Date.UTC(year, month, day, hour, minute, second);
            const offsetMs = (tzHours * 60 + tzMinutes) * 60 * 1000 * tzSign;
            
            return new Date(utcTime - offsetMs);
        }

services:
  aceserve:
    image: jopsis/aceserve:latest
    container_name: aceserve-engine
    ports:
      - "6878:6878"    # AceStream HTTP port
      - "62062:62062"  # AceStream API/control port
      - "8621:8621"    # AceStream P2P port
    restart: unless-stopped
    networks:
      - aceproxy-net
    healthcheck:
      test: ["CMD", "sh", "-c", "nc -z 127.0.0.1 6878 && nc -z 127.0.0.1 62062 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    dns:
      - 1.1.1.1
      - 1.0.0.1

  httpaceproxy:
    # build:
    #   context: .
    #   dockerfile: httpaceproxycpp/Dockerfile
    image: jopsis/httpaceproxy:latest
    container_name: httpaceproxy
    ports:
      - "8888:8888"
    environment:
      - ACEPROXY_HOST=0.0.0.0
      - ACEPROXY_PORT=8888
      - ACESTREAM_HOST=aceserve
      - ACESTREAM_API_PORT=62062
      - ACESTREAM_HTTP_PORT=6878
      - MAX_CONNECTIONS=${MAX_CONNECTIONS:-10}
      - MAX_CONCURRENT_CHANNELS=${MAX_CONCURRENT_CHANNELS:-5}
      - ENABLED_PLUGINS=${ENABLED_PLUGINS:-newera,elcano,acepl,af1c1onados,aio,stat,statplugin}
      - AIO_PLUGINS=${AIO_PLUGINS:-all}
    depends_on:
      aceserve:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8888/stat"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - aceproxy-net

networks:
  aceproxy-net:
    driver: bridge
